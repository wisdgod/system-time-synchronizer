name: 构建和发布

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: 构建 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux-x64
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            name: Linux-arm64
            target: aarch64-unknown-linux-musl
          - os: windows-latest
            name: Windows-x64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            name: Windows-arm64
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            name: macOS-x64
            target: x86_64-apple-darwin
          - os: macos-latest
            name: macOS-arm64
            target: aarch64-apple-darwin

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 mold
        uses: rui314/setup-mold@v1
        with:
          make-default: false

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: 设置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: 构建二进制文件
        run: |
          RUSTFLAGS="-C link-arg=-s -C link-arg=-fuse-ld=mold" cargo build --release --target ${{ matrix.target }} --bin system-time-synchronizer
        shell: bash

      - name: 准备发布文件
        run: |
          mkdir -p release
          BIN_NAME="system-time-synchronizer"
          
          # 根据平台设置文件扩展名
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            EXT=".exe"
          else
            EXT=""
          fi
          
          # 复制并重命名二进制文件
          SOURCE="target/${{ matrix.target }}/release/${BIN_NAME}${EXT}"
          DEST="release/${BIN_NAME}-${{ matrix.target }}${EXT}"
          
          if [[ -f "$SOURCE" ]]; then
            cp "$SOURCE" "$DEST"
            echo "✓ 已复制: $DEST"
          else
            echo "✗ 找不到文件: $SOURCE"
            exit 1
          fi
          
          # 列出生成的文件
          ls -la release/
        shell: bash

      - name: 压缩二进制文件
        run: |
          cd release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a -tzip "../system-time-synchronizer-${{ matrix.target }}.zip" *
          else
            tar czf "../system-time-synchronizer-${{ matrix.target }}.tar.gz" *
          fi
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: system-time-synchronizer-${{ matrix.target }}.*
          retention-days: 1

  release:
    name: 创建发布
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 准备发布文件
        run: |
          mkdir -p release
          
          # 移动所有文件到 release 目录
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          
          # 生成校验和
          cd release
          sha256sum * > SHA256SUMS.txt
          
          # 显示所有文件
          echo "📦 准备发布的文件："
          ls -lah

      - name: 获取版本信息
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: 生成下载表格
        id: release_body
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # 开始构建 Release Body
          {
            echo "body<<EOF"
            echo "## 📦 下载"
            echo ""
            echo "| 平台 | 架构 | 下载链接 |"
            echo "|------|------|----------|"
            echo "| Linux | x86_64 | [system-time-synchronizer-x86_64-unknown-linux-musl.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-x86_64-unknown-linux-musl.tar.gz) |"
            echo "| Linux | aarch64 | [system-time-synchronizer-aarch64-unknown-linux-musl.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-aarch64-unknown-linux-musl.tar.gz) |"
            echo "| Windows | x86_64 | [system-time-synchronizer-x86_64-pc-windows-msvc.zip](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-x86_64-pc-windows-msvc.zip) |"
            echo "| Windows | aarch64 | [system-time-synchronizer-aarch64-pc-windows-msvc.zip](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-aarch64-pc-windows-msvc.zip) |"
            echo "| macOS | x86_64 (Intel) | [system-time-synchronizer-x86_64-apple-darwin.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-x86_64-apple-darwin.tar.gz) |"
            echo "| macOS | aarch64 (Apple Silicon) | [system-time-synchronizer-aarch64-apple-darwin.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-aarch64-apple-darwin.tar.gz) |"
            echo ""
            echo "### 📝 文件校验"
            echo "[SHA256SUMS.txt](https://github.com/${{ github.repository }}/releases/download/${VERSION}/SHA256SUMS.txt)"
            echo ""
            echo "---"
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          files: release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: ${{ steps.release_body.outputs.body }}
