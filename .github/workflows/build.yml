name: 构建和发布

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NDK_VERSION: r28c
  ANDROID_API_LEVEL: 28

jobs:
  build:
    name: 构建 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux-x64
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            name: Linux-arm64
            target: aarch64-unknown-linux-musl
          - os: windows-latest
            name: Windows-x64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            name: Windows-arm64
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            name: macOS-x64
            target: x86_64-apple-darwin
          - os: macos-latest
            name: macOS-arm64
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            name: Android-arm64
            target: aarch64-linux-android
          - os: ubuntu-latest
            name: Android-x64
            target: x86_64-linux-android

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 lld
        if: runner.os == 'Linux' && !contains(matrix.target, 'android')
        run: |
          if [ "$(whoami)" = root ]; then SUDO=; else SUDO=sudo; fi
          $SUDO apt-get update -qq
          $SUDO apt-get install -y -qq lld >/dev/null
        shell: bash

      - name: 安装 Android NDK
        if: contains(matrix.target, 'android')
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: 配置 Android 交叉编译
        if: contains(matrix.target, 'android')
        run: |
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"

          mkdir -p .cargo
          CARGO_CONFIG=".cargo/config.toml"

          if [ -f "$CARGO_CONFIG" ]; then
            echo "找到现有的 .cargo/config.toml，将追加配置"
          else
            echo "创建新的 .cargo/config.toml 文件"
            touch "$CARGO_CONFIG"
          fi

          if [[ "${{ matrix.target }}" == "aarch64-linux-android" ]]; then
            cat >> "$CARGO_CONFIG" << EOF

          [target.aarch64-linux-android]
          linker = "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang"
          ar = "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"

          [env]
          CC_aarch64_linux_android = { value = "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang", force = true, relative = false }
          AR_aarch64_linux_android = { value = "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar", force = true, relative = false }
          EOF

          elif [[ "${{ matrix.target }}" == "x86_64-linux-android" ]]; then
            cat >> "$CARGO_CONFIG" << EOF

          [target.x86_64-linux-android]
          linker = "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${{ env.ANDROID_API_LEVEL }}-clang"
          ar = "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"

          [env]
          CC_x86_64_linux_android = { value = "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${{ env.ANDROID_API_LEVEL }}-clang", force = true, relative = false }
          AR_x86_64_linux_android = { value = "${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar", force = true, relative = false }
          EOF
          fi
        shell: bash

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: 设置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: 构建二进制文件
        run: |
          RUSTFLAGS="-C strip=symbols"

          # Linux 非 Android：使用 lld
          if [[ "${{ runner.os }}" == "Linux" ]] && ! [[ "${{ matrix.target }}" == *"android"* ]]; then
            if command -v ld.lld >/dev/null 2>&1; then
              RUSTFLAGS="$RUSTFLAGS -C link-arg=-fuse-ld=lld"
              echo "✓ 使用 lld 链接器"
            else
              echo "✓ 使用默认链接器"
            fi
          else
            echo "✓ 使用平台默认链接器"
          fi

          RUSTFLAGS="$RUSTFLAGS" \
            cargo build --release --target ${{ matrix.target }} --bin system-time-synchronizer
        shell: bash

      - name: 准备发布文件
        run: |
          mkdir -p release
          BIN_NAME="system-time-synchronizer"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            EXT=".exe"
          else
            EXT=""
          fi

          SOURCE="target/${{ matrix.target }}/release/${BIN_NAME}${EXT}"
          DEST="release/${BIN_NAME}${EXT}"

          if [[ -f "$SOURCE" ]]; then
            cp "$SOURCE" "$DEST"
            echo "✓ 已复制: $DEST"
          else
            echo "✗ 找不到文件: $SOURCE"
            exit 1
          fi
        shell: bash

      - name: 压缩二进制文件
        run: |
          cd release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a -tzip "../system-time-synchronizer-${{ matrix.target }}.zip" *
          else
            tar czf "../system-time-synchronizer-${{ matrix.target }}.tar.gz" *
          fi
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: system-time-synchronizer-${{ matrix.target }}.*
          retention-days: 1

  release:
    name: 创建发布
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 准备发布文件
        run: |
          mkdir -p release

          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;

          cd release
          sha256sum * > SHA256SUMS.txt

          echo "📦 准备发布的文件："
          ls -lah

      - name: 获取版本信息
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: 生成下载表格
        id: release_body
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          {
            echo "body<<EOF"
            echo "## 📦 下载"
            echo ""
            echo "| 平台 | 架构 | 下载链接 |"
            echo "|------|------|----------|"
            echo "| Linux | x86_64 | [system-time-synchronizer-x86_64-unknown-linux-musl.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-x86_64-unknown-linux-musl.tar.gz) |"
            echo "| Linux | aarch64 | [system-time-synchronizer-aarch64-unknown-linux-musl.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-aarch64-unknown-linux-musl.tar.gz) |"
            echo "| Windows | x86_64 | [system-time-synchronizer-x86_64-pc-windows-msvc.zip](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-x86_64-pc-windows-msvc.zip) |"
            echo "| Windows | aarch64 | [system-time-synchronizer-aarch64-pc-windows-msvc.zip](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-aarch64-pc-windows-msvc.zip) |"
            echo "| macOS | x86_64 (Intel) | [system-time-synchronizer-x86_64-apple-darwin.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-x86_64-apple-darwin.tar.gz) |"
            echo "| macOS | aarch64 (Apple Silicon) | [system-time-synchronizer-aarch64-apple-darwin.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-aarch64-apple-darwin.tar.gz) |"
            echo "| Android | x86_64 | [system-time-synchronizer-x86_64-linux-android.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-x86_64-linux-android.tar.gz) |"
            echo "| Android | aarch64 | [system-time-synchronizer-aarch64-linux-android.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/system-time-synchronizer-aarch64-linux-android.tar.gz) |"
            echo ""
            echo "### 📝 文件校验"
            echo "[SHA256SUMS.txt](https://github.com/${{ github.repository }}/releases/download/${VERSION}/SHA256SUMS.txt)"
            echo ""
            echo "---"
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          files: release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: ${{ steps.release_body.outputs.body }}
